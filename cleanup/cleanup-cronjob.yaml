# Cleanup CronJob: deletes orphaned 'ephemeral=true' namespaces that
# are older than THRESHOLD_SECONDS (default: 1 hour).
#
# This runs even if a pipeline crashes mid-build and fails to clean up.
# It's the safety net that keeps the cluster from filling up.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-janitor
  namespace: jenkins-agents

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-janitor
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-janitor
subjects:
  - kind: ServiceAccount
    name: namespace-janitor
    namespace: jenkins-agents
roleRef:
  kind: ClusterRole
  name: namespace-janitor
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-stale-namespaces
  namespace: jenkins-agents
spec:
  schedule: "*/15 * * * *"   # every 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: namespace-janitor
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: alpine/k8s:1.34.1
              env:
                - name: THRESHOLD_SECONDS
                  value: "3600"       # 1 hour
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  NOW=$(date +%s)
                  echo "Scanning for ephemeral namespaces older than ${THRESHOLD_SECONDS}s"
                  # List namespaces labeled ephemeral=true, with their creation timestamp.
                  kubectl get ns -l ephemeral=true \
                    -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.creationTimestamp}{"\n"}{end}' \
                    | while read -r NAME CREATED; do
                        [ -z "$NAME" ] && continue
                        # BusyBox date (alpine) needs -D for RFC3339 parsing.
                        CREATED_EPOCH=$(date -D '%Y-%m-%dT%H:%M:%SZ' -d "$CREATED" +%s 2>/dev/null || echo 0)
                        AGE=$((NOW - CREATED_EPOCH))
                        if [ "$AGE" -gt "$THRESHOLD_SECONDS" ]; then
                          echo "Deleting $NAME (age ${AGE}s)"
                          kubectl delete namespace "$NAME" --wait=false || true
                        else
                          echo "Keeping $NAME (age ${AGE}s)"
                        fi
                      done
                  echo "Done."
